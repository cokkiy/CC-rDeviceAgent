[service]
service_name = "CC-rStationService"
station_id = "station-01"
state_interval_seconds = 5
watched_processes = []
udp_display_target = "127.0.0.1:9008"
launcher_proxy_path = ""

[control]
listen_addr = "0.0.0.0:50051"

[agent]
listen_addr = "127.0.0.1:50052"
auth_token = "local-change-me"
preferred_display_index = 0

[mqtt]
enabled = true
broker_host = "localhost"
broker_port = 1883
telemetry_enabled = true
status_enabled = true

[[mqtt.telemetry_profiles]]
id = "Default"
name = "Default"
enabled = true
collection_interval_ms = 1500
includes = [
    "runtime_basic",
    "runtime_system",
    "runtime_network",
]

[[mqtt.telemetry_profiles]]
id = "App"
name = "AppWatch"
enabled = true
collection_interval_ms = 5000
includes = [
    "runtime_apps",
    "runtime_storage",
]
