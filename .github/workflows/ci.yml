name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb1-dev \
            libx11-dev \
            libxrandr-dev \
            libxfixes-dev \
            libxtst-dev

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check workspace
        run: cargo check --workspace --all-targets

      - name: Check packet capture feature
        if: runner.os != 'Windows'
        run: cargo check --workspace --all-targets --features packet-capture

      - name: Test workspace
        run: cargo test --workspace --all-targets

      - name: Test packet capture feature
        if: runner.os != 'Windows'
        run: cargo test --workspace --all-targets --features packet-capture

      - name: Clippy
        if: runner.os == 'Linux'
        run: cargo clippy --workspace --all-targets -- -D warnings
